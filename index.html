<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kẻ Trinh Thám - 谁是卧底</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 10px;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    h1 { margin: 20px 0 5px; font-size: 2.8em; color: #333; }
    .subtitle { font-size: 1.4em; color: #555; margin-bottom: 15px; }
    
    table {
      margin: 25px auto;
      border-collapse: collapse;
      background: #f8f9fa;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    td {
      width: 190px;
      height: 110px;
      border: 2px solid #ddd;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
      vertical-align: middle;
      font-size: 15px;
    }
    td:hover { background: #f0f0f0; transform: scale(1.03); }
    .green { background-color: #90EE90 !important; font-weight: bold; }
    .strikethrough { text-decoration: line-through; color: #666; }

    .word-vn { font-weight: bold; font-size: 15.5px; line-height: 1.3; }
    .word-cn { font-size: 13.5px; color: #555; line-height: 1.2; }

    .room-code { font-size: 32px; font-weight: bold; color: #e91e63; }
    button {
      padding: 14px 28px;
      margin: 10px;
      font-size: 17px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }
    .player-list {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
    }
    .player {
      background: #e3f2fd;
      padding: 10px 18px;
      border-radius: 25px;
      border: 2px solid #2196f3;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🕵️ Kẻ Trinh Thám</h1>
    <p class="subtitle">谁是卧底 / Who is the Chameleon</p>

    <div id="lobby">
      <input type="text" id="nickname" placeholder="Nhập tên / 输入名字" style="padding:14px; font-size:18px; width:260px;">
      <br><br>
      <button onclick="createRoom()" style="background:#4caf50; color:white;">Tạo Phòng Mới / 创建房间</button>
      <br><br>
      <input type="text" id="roomCode" placeholder="Nhập mã phòng / 输入房间码" style="padding:14px; font-size:18px; width:220px;">
      <button onclick="joinRoom()" style="background:#2196f3; color:white;">Vào Phòng / 加入</button>
    </div>

    <div id="game" style="display:none; padding:20px;">
      <p>Mã phòng: <span class="room-code" id="displayCode"></span></p>
      <div class="player-list" id="playerList"></div>
      
      <button onclick="startGame()" id="startBtn" style="display:none; background:#ff9800; color:white; font-size:19px; padding:16px 40px;">🚀 BẮT ĐẦU GAME / 开始游戏</button>

      <div id="roleInfo" style="margin:30px; font-size:24px; font-weight:bold; min-height:80px;"></div>
      
      <table id="board"></table>

      <div style="margin-top:25px;">
        <button onclick="endRound()" style="background:#f44336; color:white;">Kết thúc Round / 结束本轮</button>
        <button onclick="leaveRoom()">Rời phòng / 退出房间</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBMM3os1jRLbzF9KUNkene328XgSmr8pKg",
      authDomain: "chamm-f7898.firebaseapp.com",
      databaseURL: "https://chamm-f7898-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chamm-f7898",
      storageBucket: "chamm-f7898.firebasestorage.app",
      messagingSenderId: "936197801014",
      appId: "1:936197801014:web:a011ce668aadfd43734497"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentRoom = null;
    let myName = null;
    let isHost = false;

    const boardWords = [
      ["Du học nước ngoài", "留学国外"],
      ["Lập gia đình", "结婚"],
      ["Mua nhà riêng", "买房"],
      ["Khởi nghiệp", "创业"],
      ["Thăng tiến sự nghiệp", "升职"],
      ["Du lịch vòng quanh thế giới", "环球旅行"],
      ["Sinh con", "生孩子"],
      ["Chuyển việc", "跳槽"],
      ["Tiết kiệm & Đầu tư", "理财投资"],
      ["Sống ở nước ngoài", "在国外生活"],
      ["Học thêm kỹ năng mới", "学习新技能"],
      ["Viết sách / Xuất bản", "写书出版"],
      ["Tập gym & Sức khỏe", "健身"],
      ["Học ngôn ngữ mới", "学新语言"],
      ["Nghỉ hưu sớm", "早退休"],
      ["Mở quán cà phê / Nhà hàng", "开咖啡店"]
    ];

    function createRoom() {
      myName = document.getElementById("nickname").value.trim();
      if (!myName) return alert("Vui lòng nhập tên!");
      currentRoom = Math.random().toString(36).substring(2, 8).toUpperCase();
      isHost = true;
      enterGame();
      initRoom();
    }

    function joinRoom() {
      myName = document.getElementById("nickname").value.trim();
      const code = document.getElementById("roomCode").value.trim().toUpperCase();
      if (!myName || !code) return alert("Nhập đủ tên và mã phòng!");
      currentRoom = code;
      enterGame();
      initRoom();
    }

    function enterGame() {
      document.getElementById("lobby").style.display = "none";
      document.getElementById("game").style.display = "block";
      document.getElementById("displayCode").textContent = currentRoom;
      if (isHost) document.getElementById("startBtn").style.display = "inline-block";
    }

    function initRoom() {
      const roomRef = db.ref("rooms/" + currentRoom);
      roomRef.child("players/" + myName).set({ name: myName, online: Date.now() });

      roomRef.on("value", (snapshot) => {
        const data = snapshot.val() || {};
        updatePlayerList(data.players || {});
        if (data.gameState === "playing" && data.keyword) {
          renderBoard(data.keyword, data.chameleon === myName, data.striked || {});
        }
      });
    }

    function updatePlayerList(players) {
      const list = document.getElementById("playerList");
      list.innerHTML = "";
      Object.keys(players).forEach(name => {
        const div = document.createElement("div");
        div.className = "player";
        div.textContent = name + (name === myName ? " (Bạn)" : "");
        list.appendChild(div);
      });
    }

    function startGame() {
      if (!isHost) return alert("Chỉ người tạo phòng mới được bắt đầu!");
      const roomRef = db.ref("rooms/" + currentRoom);
      roomRef.once("value").then(snapshot => {
        const players = Object.keys(snapshot.val()?.players || {});
        if (players.length < 3) return alert("Cần ít nhất 3 người chơi!");

        const chameleon = players[Math.floor(Math.random() * players.length)];
        const flatWords = boardWords.map(pair => pair[0]); // Lấy tiếng Việt
        const keyword = flatWords[Math.floor(Math.random() * flatWords.length)];

        roomRef.update({
          gameState: "playing",
          chameleon: chameleon,
          keyword: keyword,
          striked: {}
        });
      });
    }

    function renderBoard(keyword, isChameleon, striked) {
      const table = document.getElementById("board");
      table.innerHTML = "";
      let html = "<tr>";
      let count = 0;

      for (let pair of boardWords) {
        const vn = pair[0];
        const cn = pair[1];
        const isTarget = vn === keyword;
        const isStriked = !!striked[vn];
        let cls = "";
        if (!isChameleon && isTarget) cls = "green";
        if (isStriked) cls += " strikethrough";

        html += `<td class="${cls}" onclick="toggleStrike('${vn}')">
          <div class="word-vn">${vn}</div>
          <div class="word-cn">${cn}</div>
        </td>`;

        count++;
        if (count % 4 === 0) html += "</tr><tr>";
      }
      html += "</tr>";
      table.innerHTML = html;

      document.getElementById("roleInfo").innerHTML = isChameleon 
        ? `<span style="color:red;">Bạn là KẺ GIẢ MẠO!<br>你是卧底！</span>` 
        : `Từ khóa: <span style="color:green; font-size:26px;">${keyword}</span>`;
    }

    function toggleStrike(word) {
      db.ref("rooms/" + currentRoom + "/striked/" + word).transaction(v => !v);
    }

    function endRound() { alert("Round kết thúc! Host bấm BẮT ĐẦU GAME để chơi tiếp."); }
    function leaveRoom() { if(confirm("Rời phòng?")) location.reload(); }
  </script>
</body>
</html>
